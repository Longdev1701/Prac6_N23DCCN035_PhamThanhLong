<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Management System</title>
  <meta name="description" content="Hệ thống quản lý sinh viên - CRUD API với Node.js, Express, MongoDB">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="app-container">
    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <div class="logo">
          <div class="logo-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
              <path d="M6 12v5c6 3 12 0 12 0v-5"/>
            </svg>
          </div>
          <h1>Student Manager</h1>
        </div>
        <div class="header-stats" id="headerStats">
          <div class="stat-chip">
            <span class="stat-label">Tổng SV</span>
            <span class="stat-value" id="totalStudents">0</span>
          </div>
          <div class="stat-chip accent">
            <span class="stat-label">Điểm TB</span>
            <span class="stat-value" id="avgScore">0</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Main content -->
    <main class="main">
      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-left">
          <div class="search-box">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
            </svg>
            <input type="text" id="searchInput" placeholder="Tìm kiếm sinh viên..." autocomplete="off">
          </div>
          <div class="filter-group">
            <select id="majorFilter">
              <option value="">Tất cả ngành</option>
              <option value="IT">IT</option>
              <option value="Business">Business</option>
              <option value="Design">Design</option>
              <option value="Marketing">Marketing</option>
            </select>
          </div>
        </div>
        <div class="toolbar-right">
          <button class="btn btn-secondary" id="btnTopStudents" title="Top sinh viên">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
            Top SV
          </button>
          <button class="btn btn-primary" id="btnAddStudent">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Thêm sinh viên
          </button>
        </div>
      </div>

      <!-- Table -->
      <div class="table-container">
        <table class="table" id="studentTable">
          <thead>
            <tr>
              <th>Mã SV</th>
              <th>Họ tên</th>
              <th>Email</th>
              <th>Ngành</th>
              <th>Điểm</th>
              <th>Ngày nhập học</th>
              <th>Trạng thái</th>
              <th>Thao tác</th>
            </tr>
          </thead>
          <tbody id="studentTableBody">
            <!-- Dynamic content -->
          </tbody>
        </table>
        <div class="empty-state" id="emptyState" style="display:none;">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <p>Chưa có sinh viên nào</p>
          <span>Nhấn "Thêm sinh viên" để bắt đầu</span>
        </div>
      </div>

      <!-- Pagination -->
      <div class="pagination" id="pagination"></div>
    </main>
  </div>

  <!-- Modal: Add/Edit Student -->
  <div class="modal-overlay" id="studentModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Thêm sinh viên mới</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <form id="studentForm" class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label for="inputStudentId">Mã sinh viên <span class="required">*</span></label>
            <input type="text" id="inputStudentId" placeholder="VD: SV001" required>
          </div>
          <div class="form-group">
            <label for="inputName">Họ tên <span class="required">*</span></label>
            <input type="text" id="inputName" placeholder="VD: Nguyễn Văn A" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="inputEmail">Email <span class="required">*</span></label>
            <input type="email" id="inputEmail" placeholder="VD: sv001@gmail.com" required>
          </div>
          <div class="form-group">
            <label for="inputMajor">Ngành học</label>
            <select id="inputMajor">
              <option value="">-- Chọn ngành --</option>
              <option value="IT">IT</option>
              <option value="Business">Business</option>
              <option value="Design">Design</option>
              <option value="Marketing">Marketing</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="inputScore">Điểm số</label>
            <input type="number" id="inputScore" min="0" max="100" step="0.1" placeholder="0 - 100" value="0">
          </div>
          <div class="form-group">
            <label for="inputEnrollmentDate">Ngày nhập học</label>
            <input type="date" id="inputEnrollmentDate">
          </div>
        </div>
        <input type="hidden" id="editingId" value="">
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" id="btnCancel">Hủy</button>
          <button type="submit" class="btn btn-primary" id="btnSubmit">Tạo sinh viên</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Update Score -->
  <div class="modal-overlay" id="scoreModal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2>Cập nhật điểm</h2>
        <button class="modal-close" id="scoreModalClose">&times;</button>
      </div>
      <form id="scoreForm" class="modal-body">
        <p class="score-student-name" id="scoreStudentName"></p>
        <div class="form-group">
          <label for="inputNewScore">Điểm mới</label>
          <input type="number" id="inputNewScore" min="0" max="100" step="0.1" placeholder="0 - 100" required>
          <div class="score-slider-container">
            <input type="range" id="scoreSlider" min="0" max="100" value="0" class="score-slider">
            <div class="score-labels">
              <span>0</span><span>25</span><span>50</span><span>75</span><span>100</span>
            </div>
          </div>
        </div>
        <input type="hidden" id="scoreEditingId" value="">
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" id="scoreCancel">Hủy</button>
          <button type="submit" class="btn btn-primary">Cập nhật</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Top Students -->
  <div class="modal-overlay" id="topModal">
    <div class="modal">
      <div class="modal-header">
        <h2>🏆 Top sinh viên theo điểm</h2>
        <button class="modal-close" id="topModalClose">&times;</button>
      </div>
      <div class="modal-body" id="topStudentsList"></div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="app.js"></script>
</body>
</html>
